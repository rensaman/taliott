<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper background -->
  <rect width="32" height="32" fill="#f3f0e8"/>
  <!-- Grid (matches body background pattern) -->
  <line x1="0" y1="10" x2="32" y2="10" stroke="#151510" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="20" x2="32" y2="20" stroke="#151510" stroke-width="0.5" opacity="0.08"/>
  <line x1="10" y1="0" x2="10" y2="32" stroke="#151510" stroke-width="0.5" opacity="0.08"/>
  <line x1="20" y1="0" x2="20" y2="32" stroke="#151510" stroke-width="0.5" opacity="0.08"/>
  <!-- Border -->
  <rect x="1" y="1" width="30" height="30" fill="none" stroke="#151510" stroke-width="1.5"/>
  <!-- Bold condensed T — reflects Big Shoulders Display 900 style -->
  <rect x="4"  y="7"  width="24" height="5" fill="#151510"/>
  <rect x="13" y="12" width="6"  height="14" fill="#151510"/>
</svg>
