services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taliott_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1026:1025"
      - "8025:8025"

  otp:
    image: opentripplanner/opentripplanner:2.6.0
    ports:
      - "8080:8080"
    volumes:
      - ./otp/data:/var/opentripplanner
    command: ["--build", "--serve"]
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
    mem_limit: 4g

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taliott_dev
      NODE_ENV: production
      PORT: 4000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: taliott <noreply@taliott.app>
      APP_BASE_URL: http://localhost:3000
      OTP_BASE_URL: http://otp:8080
      ORS_API_KEY: ${ORS_API_KEY}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      otp:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
        VITE_UMAMI_SCRIPT_URL: ${VITE_UMAMI_SCRIPT_URL:-}
        VITE_CONTACT_EMAIL: ${VITE_CONTACT_EMAIL:-}
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres-umami:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
      POSTGRES_DB: umami
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@postgres-umami:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-taliott-umami-change-me}
    depends_on:
      postgres-umami:
        condition: service_healthy

volumes:
  postgres_data:
  umami_db_data:
